<!DOCTYPE html>
<html lang="pt-BR" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="7° Tom — Sistema de gestão de louvor para equipes adventistas." />
  <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f3ef" media="(prefers-color-scheme: light)" />

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="7° Tom" />

  <!-- Open Graph -->
  <meta property="og:title" content="7° Tom" />
  <meta property="og:description" content="Gestão de louvor para equipes adventistas." />
  <meta property="og:type" content="website" />

  <title>7° Tom</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />

  <!-- Preconnect para fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
</head>
<body class="tema-claro">

  <!-- ═══════════════════════════════════════════
       CABEÇALHO GLOBAL
  ═══════════════════════════════════════════ -->
  <header id="cabecalho" role="banner">
    <div class="cabecalho-interno">

      <!-- Marca -->
      <a href="#" class="marca" aria-label="7° Tom — Página inicial">
        <span class="marca-numero" aria-hidden="true">7°</span>
        <span class="marca-texto">Tom</span>
      </a>

      <!-- Navegação de utilidades -->
      <nav class="cabecalho-util" aria-label="Utilitários">
        <button
          id="btn-tema"
          class="btn-icone"
          type="button"
          aria-label="Alternar para modo escuro"
          title="Alternar tema"
        >
          <!-- Ícone Sol (modo claro ativo) -->
          <svg class="icone icone-sol" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <!-- Ícone Lua (modo escuro ativo) -->
          <svg class="icone icone-lua" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </nav>

    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       CONTAINER PRINCIPAL DA SPA
       Todas as telas são injetadas aqui via JS
  ═══════════════════════════════════════════ -->
  <main id="container-app" role="main">

    <!-- ─────────────────────────────────────────
         TELA: ACESSO RÁPIDO (login por CPF)
         data-tela="acesso" — controlada por app.js
    ───────────────────────────────────────── -->
    <section
      id="tela-acesso"
      class="tela tela-ativa"
      data-tela="acesso"
      aria-labelledby="titulo-acesso"
    >

      <!-- Bloco visual de boas-vindas -->
      <div class="acesso-hero" aria-hidden="true">
        <div class="acesso-notas">
          <span class="nota nota-1">♩</span>
          <span class="nota nota-2">♪</span>
          <span class="nota nota-3">♫</span>
          <span class="nota nota-4">♬</span>
        </div>
      </div>

      <!-- Card de acesso -->
      <div class="acesso-card">
        <div class="acesso-cabecalho">
          <h1 id="titulo-acesso" class="acesso-titulo">
            Bem-vindo ao<br/>
            <strong>7° Tom</strong>
          </h1>
          <p class="acesso-subtitulo">
            Insira seu CPF para acessar a equipe de louvor.
          </p>
        </div>

        <!-- Formulário de acesso -->
        <form
          id="form-acesso"
          class="acesso-form"
          novalidate
          aria-label="Formulário de acesso por CPF"
        >

          <div class="campo-grupo">
            <label class="campo-label" for="input-cpf">
              CPF
            </label>
            <div class="campo-input-wrapper">
              <input
                id="input-cpf"
                class="campo-input"
                type="text"
                inputmode="numeric"
                autocomplete="off"
                maxlength="14"
                placeholder="000.000.000-00"
                aria-describedby="cpf-dica cpf-erro"
                aria-required="true"
                spellcheck="false"
              />
              <span class="campo-icone" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
            </div>
            <span id="cpf-dica" class="campo-dica">
              Apenas números — seu acesso é pessoal e intransferível.
            </span>
            <span
              id="cpf-erro"
              class="campo-erro"
              role="alert"
              aria-live="polite"
              hidden
            ></span>
          </div>

          <button id="btn-entrar" class="btn-primario" type="submit">
            <span class="btn-texto">Entrar</span>
            <span class="btn-spinner" aria-hidden="true" hidden>
              <svg viewBox="0 0 24 24" class="spinner-icone">
                <circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4"/>
              </svg>
            </span>
          </button>

        </form>

        <!-- Rodapé do card -->
        <p class="acesso-rodape">
          Primeira vez? Fale com o seu
          <strong>Diretor de Louvor</strong>.
        </p>

      </div><!-- /acesso-card -->

    </section><!-- /tela-acesso -->

  </main>

  <!-- ═══════════════════════════════════════════
       NOTIFICAÇÕES TOAST
  ═══════════════════════════════════════════ -->
  <div
    id="area-toast"
    class="area-toast"
    role="region"
    aria-label="Notificações"
    aria-live="polite"
    aria-atomic="false"
  ></div>

  <!-- ═══════════════════════════════════════════
       SCRIPTS (ES Modules)
  ═══════════════════════════════════════════ -->
  <script type="module" src="app.js"></script>

</body>
</html>
