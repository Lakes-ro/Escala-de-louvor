<!DOCTYPE html>
<html lang="pt-BR" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="7° Tom — Sistema de gestão de louvor para equipes adventistas." />
  <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f3ef" media="(prefers-color-scheme: light)" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="7° Tom" />
  <meta property="og:title" content="7° Tom" />
  <meta property="og:description" content="Gestão de louvor para equipes adventistas." />
  <meta property="og:type" content="website" />

  <title>7° Tom</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style-telas.css" />
  <link rel="stylesheet" href="style-componentes.css" />
  <link rel="manifest" href="manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
</head>
<body class="tema-claro">

  <header id="cabecalho" role="banner">
    <div class="cabecalho-interno">
      <a href="#" class="marca" aria-label="7° Tom — Página inicial">
        <span class="marca-numero" aria-hidden="true">7°</span>
        <span class="marca-texto">Tom</span>
      </a>
      <nav class="cabecalho-util" aria-label="Utilitários">
        <button
          id="btn-tema"
          class="btn-icone"
          type="button"
          aria-label="Alternar para modo escuro"
          title="Alternar tema"
        >
          <svg class="icone icone-sol" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icone icone-lua" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main id="container-app" role="main">

    <section
      id="tela-acesso"
      class="tela tela-ativa"
      data-tela="acesso"
      aria-labelledby="titulo-acesso"
    >
      <div class="acesso-hero" aria-hidden="true">
        <div class="acesso-notas">
          <span class="nota nota-1">♩</span>
          <span class="nota nota-2">♪</span>
          <span class="nota nota-3">♫</span>
          <span class="nota nota-4">♬</span>
        </div>
      </div>

      <div class="acesso-card">
        <div class="acesso-cabecalho">
          <h1 id="titulo-acesso" class="acesso-titulo">
            Bem-vindo ao<br/>
            <strong>7° Tom</strong>
          </h1>
          <p class="acesso-subtitulo">
            Insira seu CPF e senha para acessar a equipe de louvor.
          </p>
        </div>

        <form
          id="form-acesso"
          class="acesso-form"
          novalidate
          aria-label="Formulário de acesso"
        >
          <!-- CPF -->
          <div class="campo-grupo">
            <label class="campo-label" for="input-cpf">CPF</label>
            <div class="campo-input-wrapper">
              <input
                id="input-cpf"
                class="campo-input"
                type="text"
                inputmode="numeric"
                autocomplete="username"
                maxlength="14"
                placeholder="000.000.000-00"
                aria-describedby="cpf-dica cpf-erro"
                aria-required="true"
                spellcheck="false"
              />
              <span class="campo-icone" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
            </div>
            <span id="cpf-dica" class="campo-dica">
              Apenas números — seu acesso é pessoal e intransferível.
            </span>
            <span
              id="cpf-erro"
              class="campo-erro"
              role="alert"
              aria-live="polite"
              hidden
            ></span>
          </div>

          <!-- Senha -->
          <div class="campo-grupo">
            <label class="campo-label" for="input-senha">Senha</label>
            <div class="campo-input-wrapper">
              <input
                id="input-senha"
                class="campo-input"
                type="password"
                autocomplete="current-password"
                placeholder="Sua senha"
                aria-required="true"
              />
              <span class="campo-icone" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
            </div>
          </div>

          <button id="btn-entrar" class="btn-primario" type="submit">
            <span class="btn-texto">Entrar</span>
            <span class="btn-spinner" aria-hidden="true" hidden>
              <svg viewBox="0 0 24 24" class="spinner-icone">
                <circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4"/>
              </svg>
            </span>
          </button>
        </form>

        <p class="acesso-rodape">
          Primeira vez? Fale com o seu
          <strong>Diretor de Louvor</strong>.
        </p>
      </div>
    </section>

  </main>

  <nav id="nav-inferior" class="nav-inferior" aria-label="Navegação principal" hidden>
    <button class="nav-btn" type="button" data-nav-rota="dashboard" aria-label="Painel">
      <svg class="nav-icone" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="nav-label">Início</span>
    </button>
    <button class="nav-btn" type="button" data-nav-rota="escalas" aria-label="Escalas">
      <svg class="nav-icone" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span class="nav-label">Escalas</span>
    </button>
    <button class="nav-btn" type="button" data-nav-rota="musicas" aria-label="Músicas">
      <svg class="nav-icone" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      <span class="nav-label">Músicas</span>
    </button>
    <button class="nav-btn" type="button" data-nav-rota="eventos" aria-label="Eventos">
      <svg class="nav-icone" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <span class="nav-label">Eventos</span>
    </button>
    <button class="nav-btn" type="button" data-nav-rota="perfil" aria-label="Perfil">
      <svg class="nav-icone" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="nav-label">Perfil</span>
    </button>
  </nav>

  <div
    id="area-toast"
    class="area-toast"
    role="region"
    aria-label="Notificações"
    aria-live="polite"
    aria-atomic="false"
  ></div>

  <script type="module" src="app.js"></script>

</body>
</html>
